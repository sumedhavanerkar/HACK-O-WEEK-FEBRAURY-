<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Pro • Nagpur</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.75);
            --shadow-light: 0 8px 32px rgba(31, 38, 135, 0.37);
            --shadow-heavy: 0 25px 50px rgba(0,0,0,0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.3) 0%, transparent 50%),
                linear-gradient(-45deg, #74b9ff, #0984e3, #00b894, #fdcb6e, #fd79a8);
            background-size: 400% 400%, 400% 400%, 400% 400%, 400% 400%;
            animation: gradientShift 20s ease infinite, particles 30s linear infinite;
            min-height: 100vh;
            padding: 1.5rem;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 160px 30px, #ddd, transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: sparkle 25s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
        }

        @keyframes sparkle {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(120deg); }
        }

        @keyframes particles {
            0% { background-position: 0% 50%, 0% 50%, 0% 50%, 0% 50%; }
            100% { background-position: 100% 50%, 100% 50%, 100% 50%, 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .container {
            max-width: 580px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            border-radius: 36px;
            box-shadow: var(--shadow-heavy);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: containerFloat 6s ease-in-out infinite;
        }

        @keyframes containerFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .header {
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(15px);
            padding: 3rem 2.5rem 2rem;
            text-align: center;
            position: relative;
            border-bottom: 1px solid var(--glass-border);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            border-radius: 2px;
        }

        .brand {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .location-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            background: rgba(255,255,255,0.12);
            padding: 1.2rem 2rem;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            margin-top: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .location-selector:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .city-select {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            width: 220px;
            text-align: center;
        }

        .location-icon {
            font-size: 1.6rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .current-weather {
            padding: 3.5rem 2.5rem 2.5rem;
            text-align: center;
            position: relative;
        }

        .weather-icon {
            font-size: 7rem;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3));
            animation: float 4s ease-in-out infinite, pulse 2s ease-in-out infinite;
        }

        .temperature {
            font-size: 5.2rem;
            font-weight: 300;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.9) 50%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
            position: relative;
        }

        .temperature::after {
            content: '°C';
            font-size: 2rem;
            position: absolute;
            right: -1.2rem;
            top: 0.2rem;
            font-weight: 400;
        }

        .condition {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2.5rem;
            text-shadow: 0 2px 15px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1.2rem;
            margin-top: 2.5rem;
        }

        .detail-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 1.8rem 1.2rem;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .detail-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .detail-card:hover::before {
            left: 100%;
        }

        .detail-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.15);
        }

        .detail-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
            position: relative;
            z-index: 2;
        }

        .detail-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 2;
        }

        .detail-icon {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 2.5rem;
            background: rgba(0,0,0,0.15);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
        }

        .update-time {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .premium-badge {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #f39c12 100%);
            color: #1a1a1a;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255,215,0,0.4);
            animation: premiumGlow 2s ease-in-out infinite alternate;
        }

        @keyframes premiumGlow {
            from { box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
            to { box-shadow: 0 4px 25px rgba(255,215,0,0.6); }
        }

        @media (max-width: 480px) {
            body { padding: 1rem; }
            .container { margin: 0; border-radius: 24px; }
            .temperature { font-size: 4rem; }
            .temperature::after { font-size: 1.5rem; right: -0.8rem; }
            .weather-icon { font-size: 5.5rem; }
            .details-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        }

        @media (max-width: 360px) {
            .temperature { font-size: 3.5rem; }
            .brand { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">Weather Pro</div>
            <div class="location-selector">
                <i class="fas fa-map-marker-alt location-icon"></i>
                <select class="city-select" id="citySelect" onchange="updateWeather()">
                    <option value="nagpur">Nagpur, MH</option>
                    <option value="mumbai">Mumbai, MH</option>
                    <option value="delhi">Delhi, DL</option>
                    <option value="pune">Pune, MH</option>
                    <option value="bangalore">Bangalore, KA</option>
                </select>
            </div>
        </div>

        <div class="current-weather" id="weatherPanel">
            <div class="weather-icon" id="weatherIcon">🌤️</div>
            <div class="temperature" id="temperature">28</div>
            <div class="condition" id="condition">Partly Cloudy</div>
            
            <div class="details-grid">
                <div class="detail-card">
                    <i class="fas fa-tint detail-icon"></i>
                    <div class="detail-value" id="humidity">65%</div>
                    <div class="detail-label">Humidity</div>
                </div>
                <div class="detail-card">
                    <i class="fas fa-wind detail-icon"></i>
                    <div class="detail-value" id="wind">12 km/h</div>
                    <div class="detail-label">Wind</div>
                </div>
                <div class="detail-card">
                    <i class="fas fa-compress-arrows-alt detail-icon"></i>
                    <div class="detail-value" id="pressure">1013 hPa</div>
                    <div class="detail-label">Pressure</div>
                </div>
                <div class="detail-card">
                    <i class="fas fa-eye detail-icon"></i>
                    <div class="detail-value" id="visibility">10 km</div>
                    <div class="detail-label">Visibility</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="update-time">
                <i class="fas fa-sync-alt"></i>
                Updated: <span id="updateTime">Just now</span>
            </div>
            <div class="premium-badge">Premium</div>
        </div>
    </div>

    <script>
        const weatherData = {
            nagpur: {
                temp: 28, condition: "Partly Cloudy", icon: "🌤️",
                humidity: "65%", wind: "12 km/h", pressure: "1013 hPa", visibility: "10 km"
            },
            mumbai: {
                temp: 30, condition: "Sunny", icon: "☀️",
                humidity: "72%", wind: "15 km/h", pressure: "1009 hPa", visibility: "12 km"
            },
            delhi: {
                temp: 25, condition: "Hazy", icon: "🌫️",
                humidity: "58%", wind: "8 km/h", pressure: "1016 hPa", visibility: "8 km"
            },
            pune: {
                temp: 26, condition: "Light Rain", icon: "🌦️",
                humidity: "78%", wind: "10 km/h", pressure: "1011 hPa", visibility: "9 km"
            },
            bangalore: {
                temp: 24, condition: "Cloudy", icon: "☁️",
                humidity: "82%", wind: "6 km/h", pressure: "1014 hPa", visibility: "11 km"
            }
        };

        function updateWeather() {
            const city = document.getElementById('citySelect').value;
            const data = weatherData[city];
            
            document.getElementById('temperature').textContent = data.temp;
            document.getElementById('condition').textContent = data.condition;
            document.getElementById('weatherIcon').textContent = data.icon;
            document.getElementById('humidity').textContent = data.humidity;
            document.getElementById('wind').textContent = data.wind;
            document.getElementById('pressure').textContent = data.pressure;
            document.getElementById('visibility').textContent = data.visibility;
            
            const now = new Date();
            document.getElementById('updateTime').textContent = 
                now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit' });
        }

        updateWeather();
        setInterval(updateWeather, 30000);
    </script>
</body>
</html>
